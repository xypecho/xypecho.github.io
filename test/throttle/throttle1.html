<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>

<body>
    <button onclick="throttle(aaa,1000)">click</button>
    <script>
        function throttle(fn, delay) {
            if (fn._id) {
                clearTimeout(fn._id);
            }
            fn._id = window.setTimeout(() => {
                fn();
                fn._id = null;
            }, delay);
        }
        // 在1秒内，无论点击多少次都只会调用一次函数
        function aaa() {
            console.log('执行了哦');
        }
    </script>
</body>

</html>
