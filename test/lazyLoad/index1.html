<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrapper {
            width: 800px;
            height: 100%;
            margin: 0 auto;
            column-count: 2;
        }

        .wrapper img {
            width: 400px;
        }
    </style>
</head>

<body>
    <div class="wrapper"></div>
</body>
<script>
    function createImgElement() {
        let imgStr = "http://qietuzai.club:8081/upload/files/1618500839782file2.jpg;http://qietuzai.club:8081/upload/files/1618500839995file5.png;http://qietuzai.club:8081/upload/files/1618500839996file7.jpg;http://qietuzai.club:8081/upload/files/1618500839996file7.jpg;http://qietuzai.club:8081/upload/files/1618500840834file4.jpg;http://qietuzai.club:8081/upload/files/1618500842937file6.jpg;http://qietuzai.club:8081/upload/files/1618500844199file9.jpg;http://qietuzai.club:8081/upload/files/1618500846947file0.png",
            imgArr = imgStr.split(';'),
            wrapper = document.querySelector('.wrapper');
        console.log(imgArr)
        for (let i = 0; i < imgArr.length; i++) {
            let img = document.createElement('img');
            img.setAttribute('data-src', imgArr[i]);
            img.src = 'https://qietuzai.club/vue/static/img/lazy_loading.0e8edbc.gif';
            wrapper.appendChild(img)
        }
    }
    function observeImg() {
        let imgs = document.querySelectorAll('[data-src]');
        imgs.forEach(item => observer.observe(item))
    }
    const observer = new IntersectionObserver(changes => {
        changes.forEach(change => {
            if (change.isIntersecting) {
                const img = change.target
                img.src = img.dataset.src
                observer.unobserve(img)
            }
        })
    })
    window.onload = function () {
        createImgElement();
        observeImg();
    }
</script>

</html>
